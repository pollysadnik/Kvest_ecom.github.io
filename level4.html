<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Уровень 4</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="quest-box">

<h1>УРОВЕНЬ 4</h1>

<p>
Вы замечаете, что сразу несколько крупных компаний имеют склады рядом с этим объектом. 
  Например, склады OZON, X5 Group, Чижика, Wildberries.
</p>

<p>
Определите, что это за объект и в ответ запишите особое 3-х буквенное обозначение этого объекта.
</p>

<input id="answer">

<br>

<button onclick="check()">Ответить</button>

</div>

<script>

function check(){

let a=document.getElementById("answer").value.toLowerCase();

if(a==="SVX"){
window.location.href="level5.html";
}else{
alert("Неверно");
}

}

</script>

</body>
