<!DOCTYPE html>
<html>

<body>

<div class="quest-box">

<h1>УРОВЕНЬ 4</h1>

<p>
Вы замечаете, что крупные маркетплейсы
размещают склады рядом с транспортными узлами.
</p>

<p>
Изучите новости или карты и найдите
какой маркетплейс построил крупный
логистический центр рядом с Екатеринбургом.
</p>

<p class="copper">
Подсказка: фиолетовый логотип.
</p>

<input id="answer">

<br>

<button onclick="check()">Ответить</button>

</div>

<script>

function check(){

let a=document.getElementById("answer").value.toLowerCase();

if(a==="wildberries"){
window.location.href="level5.html";
}else{
alert("Неверно");
}

}

</script>
